<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScreenIQ — AI Candidate Screener</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div>
    <div class="logo">Screen<span>IQ</span></div>
    <div class="tagline">AI-Powered Candidate Screening</div>
  </div>
  <button class="btn-secondary hidden" id="back-btn">← New Screening</button>
  <button class="btn-secondary hidden" id="rescore-btn">↻ Re-score</button>
</header>

<main class="main">

  <!-- UPLOAD VIEW -->
  <div id="upload-view" class="upload-grid">

    <!-- Left: JD -->
    <div class="panel">
      <h2>Job Description</h2>
      <textarea id="jd-input" placeholder="Paste the job description here...">Senior Software Engineer — Backend

We are looking for a Senior Backend Engineer to join our platform team.

Requirements:
- 5+ years of software engineering experience
- Strong proficiency in Python or Node.js
- Experience with distributed systems, microservices
- AWS, GCP, or Azure cloud experience
- PostgreSQL and Redis
- Mentorship and leadership skills
- BS/MS in Computer Science or equivalent</textarea>
    </div>

    <!-- Right: Resumes + Weights + CTA -->
    <div class="right-panels">

      <div class="panel">
        <h2>Resumes (<span id="resume-count">0</span> uploaded)</h2>
        <label class="upload-zone">
          <input type="file" id="file-input" multiple accept=".txt,.pdf,.md" style="display:none" />
          <div class="upload-icon">📄</div>
          Drop .txt / .pdf resumes here or click to browse
        </label>
        <div class="file-list" id="file-list"></div>
      </div>

      <div class="panel">
        <h2>Scoring Weights</h2>
        <div class="slider-row">
          <div class="slider-label">
            <span style="color:#7c6aff">Experience</span>
            <span class="slider-val mono" id="val-experience">40</span>
          </div>
          <input type="range" id="slider-experience" min="0" max="100" step="5" style="accent-color:#7c6aff" />
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span style="color:#4ade80">Skills Match</span>
            <span class="slider-val mono" id="val-skills">35</span>
          </div>
          <input type="range" id="slider-skills" min="0" max="100" step="5" style="accent-color:#4ade80" />
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span style="color:#facc15">Education</span>
            <span class="slider-val mono" id="val-education">15</span>
          </div>
          <input type="range" id="slider-education" min="0" max="100" step="5" style="accent-color:#facc15" />
        </div>
        <div class="slider-row">
          <div class="slider-label">
            <span style="color:#ff6a6a">Leadership</span>
            <span class="slider-val mono" id="val-leadership">10</span>
          </div>
          <input type="range" id="slider-leadership" min="0" max="100" step="5" style="accent-color:#ff6a6a" />
        </div>
      </div>

      <p class="error-msg" id="error-msg"></p>
      <button class="btn-primary" id="screen-btn">⚡ Screen Candidates</button>
    </div>
  </div>

  <!-- RESULTS VIEW -->
  <div id="results-view" class="results-grid hidden">

    <!-- Sidebar -->
    <div class="sidebar">
      <div style="margin-bottom:20px">
        <div class="stat-label">SCREENED</div>
        <div class="stat-big" id="total-count">0 candidates</div>
      </div>

      <div class="rec-grid" id="rec-summary"></div>

      <h3 style="font-size:13px;font-weight:700;margin-bottom:12px">Adjust Weights</h3>

      <div class="slider-row">
        <div class="slider-label">
          <span style="color:#7c6aff">Experience</span>
          <span class="slider-val mono" id="rval-experience">40</span>
        </div>
        <input type="range" id="rslider-experience" min="0" max="100" step="5" style="accent-color:#7c6aff" />
      </div>
      <div class="slider-row">
        <div class="slider-label">
          <span style="color:#4ade80">Skills</span>
          <span class="slider-val mono" id="rval-skills">35</span>
        </div>
        <input type="range" id="rslider-skills" min="0" max="100" step="5" style="accent-color:#4ade80" />
      </div>
      <div class="slider-row">
        <div class="slider-label">
          <span style="color:#facc15">Education</span>
          <span class="slider-val mono" id="rval-education">15</span>
        </div>
        <input type="range" id="rslider-education" min="0" max="100" step="5" style="accent-color:#facc15" />
      </div>
      <div class="slider-row">
        <div class="slider-label">
          <span style="color:#ff6a6a">Leadership</span>
          <span class="slider-val mono" id="rval-leadership">10</span>
        </div>
        <input type="range" id="rslider-leadership" min="0" max="100" step="5" style="accent-color:#ff6a6a" />
      </div>
    </div>

    <!-- Cards -->
    <div class="cards-list" id="cards-list"></div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
